    <script>
const textElement = document.getElementById("auto-text");
const texts = ["Welcome", "About Women Trafficking in India"];
let index = 0;
let charIndex = 0;
let deleting = false;

function typeEffect() {
    if (!deleting && charIndex <= texts[index].length) {
        textElement.innerHTML = texts[index].substring(0, charIndex++);
    } else if (deleting && charIndex >= 0) {
        textElement.innerHTML = texts[index].substring(0, charIndex--);
    }

    if (!deleting && charIndex === texts[index].length) {
        setTimeout(() => (deleting = true), 1000);
    } else if (deleting && charIndex === 0) {
        deleting = false;
        index = (index + 1) % texts.length;
    }

    setTimeout(typeEffect, deleting ? 50 : 100);
}

typeEffect();



    </script>
